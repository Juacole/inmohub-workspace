# Configuración por defecto (Entorno Local/IDE)
server:
  port: 8082
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/property_db
    username: property_user
    password: property_password
    driver-class-name: org.postgresql.Driver
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true # Formatea el SQL en logs para mejor legibilidad
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Configuración específica para Docker
---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    # Uso del nombre del servicio property-db definido en docker-compose (DNS interno de Docker)
    url: jdbc:postgresql://property-db:5432/property_db

eureka:
  client:
    service-url:
      defaultZone: http://service-registry:8761/eureka/
  instance:
    # Fuerza el uso de la IP interna del contenedor en lugar del hostname del sistema operativo.
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true