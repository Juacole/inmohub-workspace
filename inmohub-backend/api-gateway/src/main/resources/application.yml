spring:
  application:
    name: api-gateway # Nombre con el que se buscará la configuración en el Config Server
  config:
    # Indica que debe conectarse al servidor de configuración antes de arrancar por completo.
    # "optional" permite que arranque incluso si el config server no está listo inmediatamente (útil en docker-compose)
    import: "optional:configserver:http://localhost:8888"
